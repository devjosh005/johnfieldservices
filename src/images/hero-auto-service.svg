<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-labelledby="heroSvgTitle">
  <title id="heroSvgTitle">Illustration of a technician servicing a vehicle in an auto workshop</title>
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3150"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f9a84d"/>
      <stop offset="100%" stop-color="#f4891f"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#skyGrad)"/>

  <!-- Workshop back wall -->
  <rect x="0" y="0" width="800" height="380" fill="#112240"/>
  <rect x="0" y="360" width="800" height="240" fill="#0d1b2a"/>

  <!-- Garage door panels -->
  <g opacity="0.35">
    <rect x="40" y="60" width="720" height="18" fill="#1a3150"/>
    <rect x="40" y="100" width="720" height="18" fill="#1a3150"/>
    <rect x="40" y="140" width="720" height="18" fill="#1a3150"/>
  </g>

  <!-- Hanging work light -->
  <line x1="620" y1="0" x2="620" y2="120" stroke="#f4891f" stroke-width="3" opacity="0.6"/>
  <circle cx="620" cy="132" r="18" fill="#f9a84d" opacity="0.9"/>
  <circle cx="620" cy="132" r="40" fill="#f9a84d" opacity="0.12"/>

  <!-- Floor line -->
  <rect x="0" y="430" width="800" height="6" fill="#f4891f" opacity="0.5"/>

  <!-- Car body -->
  <g transform="translate(140,300)">
    <rect x="0" y="60" width="420" height="90" rx="18" fill="url(#carGrad)"/>
    <path d="M40 60 C70 10 150 -10 260 -10 C330 -10 370 20 390 60 Z" fill="url(#carGrad)"/>
    <path d="M95 55 C115 22 160 8 235 8 C285 8 315 28 330 55 Z" fill="#0d1b2a" opacity="0.55"/>
    <circle cx="90" cy="155" r="34" fill="#0d1b2a"/>
    <circle cx="90" cy="155" r="14" fill="#6c757d"/>
    <circle cx="340" cy="155" r="34" fill="#0d1b2a"/>
    <circle cx="340" cy="155" r="14" fill="#6c757d"/>
    <rect x="-10" y="95" width="18" height="30" rx="4" fill="#0d1b2a"/>
  </g>

  <!-- Technician (simplified) -->
  <g transform="translate(560,300)">
    <circle cx="30" cy="0" r="22" fill="#f9a84d"/>
    <rect x="8" y="20" width="44" height="70" rx="14" fill="#e9ecef"/>
    <rect x="0" y="90" width="24" height="60" rx="10" fill="#112240"/>
    <rect x="38" y="90" width="24" height="60" rx="10" fill="#112240"/>
    <rect x="-18" y="30" width="24" height="70" rx="10" fill="#e9ecef" transform="rotate(18 -18 30)"/>
  </g>

  <!-- Toolbox -->
  <g transform="translate(60,420)">
    <rect x="0" y="10" width="70" height="40" rx="6" fill="#f4891f"/>
    <rect x="20" y="0" width="30" height="14" rx="4" fill="#d9710f"/>
  </g>

  <!-- Sparkle / shine accents -->
  <g fill="#f9a84d" opacity="0.8">
    <circle cx="700" cy="220" r="3"/>
    <circle cx="720" cy="260" r="2"/>
    <circle cx="680" cy="280" r="2.5"/>
  </g>
</svg>
